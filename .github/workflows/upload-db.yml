name: Upload Local Database

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Upload database artifact
        uses: actions/upload-artifact@v6
        with:
          name: inbox-cleaner-state
          path: ./data/state.sqlite
          retention-days: 90
          overwrite: true
